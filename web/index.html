<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>llm-bridge admin</title>
<link rel="stylesheet" href="/admin/static/styles.css" />
</head>
<body>
<div id="login" class="login-screen">
  <div class="login-card">
    <h1>llm-bridge</h1>
    <input id="login-user" type="text" placeholder="username" autocomplete="username" />
    <input id="login-pass" type="password" placeholder="password" autocomplete="current-password" />
    <button id="login-btn" class="primary">Login</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>llm-bridge</h1>
    <nav id="tabs">
      <button data-tab="providers" class="active">Providers</button>
      <button data-tab="models">Models</button>
      <button data-tab="logs">Logs</button>
      <button data-tab="chat">Chat</button>
    </nav>
    <span class="grow"></span>
    <button id="logout-btn" class="ghost">Logout</button>
  </header>
  <main id="content"></main>
</div>

<script type="module" src="/admin/static/app.js"></script>
</body>
</html>
